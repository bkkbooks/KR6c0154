body:
  text: 般若波羅蜜多心經解義節要引用諸家解義唐三藏法師玄奘奉詔譯唐賢首國師法藏疏宋孤山沙門知圓疏元古雲沙門元粹註元佛海沙門性證註大明天界禪寺住持宗泐奉勅註解大明翰林學士潛溪宗景濂文句佛者覺也覺自性也其法繇戒而定而慧外不著相內不著空真見本來面目虗靈要妙清淨圓融然後可以應用無染而了出世間一大公案又憫群生塵勞障重煩惱根深往往認賊為子迷妄為真故說此經以解脫之其文古其義奧其語約而其指趣綜括無遺予燕處翛然愛閱此經病諸家解義之繁乃掇其精切者錄之將以俟得佛書之三昧者質焉嘉靖癸巳夏五月既望無念居士書于紫微華下
